<!DOCTYPE html>
<!-- pages/lectures.html — 강비서 나의 강의 리스트 -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 강의 리스트 | 강비서</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/lectures.css" />
</head>
<body>

  <div class="app-shell">
    <!-- 사이드바: authGuard → loadSidebar() 에서 동적 주입 -->

    <div class="app-main" id="app-main">

      <header class="topbar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴 열기">☰</button>
        <nav class="topbar-breadcrumb" aria-label="현재 위치">
          <span>강비서</span><span>›</span><span class="current">나의 강의 리스트</span>
        </nav>
        <div class="topbar-right">
          <span class="topbar-date" id="topbar-date"></span>
          <div class="topbar-notification" role="button" aria-label="알림" tabindex="0">
            🔔<span class="notification-dot"></span>
          </div>
        </div>
      </header>

      <main class="page-content">

        <div class="lectures-header">
          <div class="lectures-header-left">
            <h1 class="page-title">나의 강의 리스트</h1>
            <p class="page-subtitle">등록된 전체 강의 일정과 정산 현황을 관리하세요.</p>
          </div>
          <div class="lectures-header-right">
            <button class="btn btn--primary" id="btn-add-lecture">＋ 강의 추가</button>
          </div>
        </div>

        <div class="summary-chips" role="status" aria-label="강의 현황 요약">
          <span class="summary-chip summary-chip--total"><span class="summary-chip-icon">📋</span><span id="chip-total">총 0건</span></span>
          <span class="summary-chip summary-chip--fee"><span class="summary-chip-icon">💰</span><span id="chip-fee">이번 달 강사료 계산 중</span></span>
          <span class="summary-chip summary-chip--unpaid"><span class="summary-chip-icon">⚠️</span><span id="chip-unpaid">미입금 0건</span></span>
          <span class="summary-chip summary-chip--upcoming"><span class="summary-chip-icon">📅</span><span id="chip-upcoming">예정 0건</span></span>
        </div>

        <div class="filter-tabs-bar" role="tablist" aria-label="강의 필터">
          <button class="filter-tab active" role="tab" aria-selected="true"  data-filter="all">📋 전체 <span class="filter-tab-count">0</span></button>
          <button class="filter-tab" role="tab" aria-selected="false" data-filter="unpaid">💰 미입금 <span class="filter-tab-count">0</span></button>
          <button class="filter-tab" role="tab" aria-selected="false" data-filter="urgent">⚠️ 준비 임박 <span class="filter-tab-count">0</span></button>
          <button class="filter-tab" role="tab" aria-selected="false" data-filter="scheduled">📅 강의 예정 <span class="filter-tab-count">0</span></button>
          <button class="filter-tab" role="tab" aria-selected="false" data-filter="discussing">💬 논의 중 <span class="filter-tab-count">0</span></button>
          <button class="filter-tab" role="tab" aria-selected="false" data-filter="done">✅ 진행 완료 <span class="filter-tab-count">0</span></button>
          <button class="filter-tab" role="tab" aria-selected="false" data-filter="onhold">⏸ 보류 중/임시저장 <span class="filter-tab-count">0</span></button>
          <button class="filter-tab" role="tab" aria-selected="false" data-filter="cancelled">❌ 취소/드롭 <span class="filter-tab-count">0</span></button>
          <button class="filter-tab" role="tab" aria-selected="false" data-filter="needs_review">🔍 확인필요 <span class="filter-tab-count">0</span></button>
        </div>

        <div class="table-panel">
          <div class="table-toolbar">
            <span class="table-result-count" id="result-count">총 <strong>0</strong>건</span>
            <div class="table-search" role="search">
              <span class="table-search-icon">🔍</span>
              <input class="table-search-input" type="search" id="table-search" placeholder="강의명, 강의처, 장소 검색..." aria-label="강의 검색" />
            </div>
          </div>
          <div class="lectures-table-wrap">
            <table class="lectures-table" aria-label="강의 목록">
              <thead>
                <tr>
                  <th scope="col" style="width:72px">날짜</th>
                  <th scope="col" style="width:96px">시간</th>
                  <th scope="col">강의 제목</th>
                  <th scope="col" style="width:140px">강의처</th>
                  <th scope="col" style="width:160px">장소</th>
                  <th scope="col" class="col-fee" style="width:100px">강사료</th>
                  <th scope="col" class="col-status" style="width:96px">상태</th>
                </tr>
              </thead>
              <tbody id="lectures-tbody"></tbody>
            </table>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- 모달: authGuard(withModal:true) → loadModal() 에서 동적 주입 -->

  <script src="../js/common.js"></script>
  <script type="module" src="../js/pages/lectures.js"></script>
</body>
</html>
