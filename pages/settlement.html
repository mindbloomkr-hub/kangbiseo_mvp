<!DOCTYPE html>
<!-- pages/settlement.html — 강비서 정산 관리 -->
<html lang="ko">
<head>

  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-MT8KX3JV');</script>
  <!-- End Google Tag Manager -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정산 관리 | 강비서</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/lectures.css" />
  <link rel="stylesheet" href="../css/settlement.css" />
  <link rel="stylesheet" href="../css/home.css" />
  <link rel="stylesheet" href="../css/modal.css" />
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MT8KX3JV"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
   

  <div class="app-shell">
    <!-- 사이드바: authGuard → loadSidebar() 에서 동적 주입 -->

    <div class="app-main" id="app-main">

      <header class="topbar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴 열기">☰</button>
        <nav class="topbar-breadcrumb" aria-label="현재 위치">
          <span>강비서</span><span>›</span><span class="current">정산 관리</span>
        </nav>
        <div class="topbar-right">
          <span class="topbar-date" id="topbar-date"></span>
        </div>
      </header>

      <main class="page-content">

        <div class="page-header">
          <div>
            <h1 class="page-title">💳 정산 관리</h1>
            <p class="page-subtitle">강의 수익과 정산 현황을 한눈에 확인하세요.</p>
          </div>
        </div>

        <!-- ① 요약 카드 -->
        <div class="sl-stat-bar" id="sl-stat-bar"></div>

        <!-- ② 필터 & 검색 -->
        <div class="sl-filter-panel" id="sl-filter-panel">

          <!-- 날짜 프리셋 -->
          <div class="sl-filter-group">
            <div class="sl-date-preset" id="sl-date-preset">
              <button class="sl-preset-btn" data-preset="this-month">이번 달</button>
              <button class="sl-preset-btn" data-preset="last-month">지난 달</button>
              <button class="sl-preset-btn" data-preset="quarter">이번 분기</button>
              <button class="sl-preset-btn" data-preset="all">전체</button>
            </div>
          </div>

          <!-- 직접 날짜 입력 -->
          <div class="sl-filter-group">
            <input type="date" id="sl-date-from" class="sl-date-input" aria-label="시작일" />
            <span class="sl-date-sep">~</span>
            <input type="date" id="sl-date-to" class="sl-date-input" aria-label="종료일" />
          </div>

          <!-- 상태 탭 -->
          <div class="sl-tab-group" id="sl-tab-group" role="group" aria-label="정산 상태 필터">
            <button class="sl-tab active" data-tab="all">전체</button>
            <button class="sl-tab" data-tab="paid">입금 완료</button>
            <button class="sl-tab" data-tab="pending">입금 대기</button>
            <button class="sl-tab" data-tab="overdue">연체</button>
            <button class="sl-tab" data-tab="scheduled">미진행/대기</button>
            <button class="sl-tab" data-tab="na">비정산 건</button>
            <button class="sl-tab" data-tab="review_cancel">검토/취소 건</button>
          </div>

          <!-- 검색 -->
          <div class="sl-search-wrap">
            <span class="sl-search-icon" aria-hidden="true">🔍</span>
            <input type="text" id="sl-search" class="sl-search-input"
                   placeholder="기관명 또는 강의명 검색..." aria-label="검색" />
          </div>

          <div class="sl-filter-right">
            <span class="sl-result-count" id="sl-result-count" aria-live="polite"></span>
          </div>
        </div>

        <!-- ③ 정산 테이블 -->
        <div class="sl-table-wrap">
          <table class="sl-table" aria-label="정산 내역">
            <thead>
              <tr>
                <th>날짜</th>
                <th>강의명</th>
                <th>기관</th>
                <th>금액</th>
                <th>지급 예정일</th>
                <th>상태</th>
                <th>작업</th>
              </tr>
            </thead>
            <tbody id="sl-table-body">
              <tr>
                <td colspan="7">
                  <div class="sl-empty">
                    <div class="sl-empty-icon">⏳</div>
                    <p>데이터를 불러오는 중...</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

      </main>
    </div>
  </div>

  <!-- 모달: authGuard(withModal:true) → loadModal() 에서 동적 주입 -->

  <script src="../js/common.js"></script>
  <script type="module" src="../js/pages/settlement.js"></script>
</body>
</html>
