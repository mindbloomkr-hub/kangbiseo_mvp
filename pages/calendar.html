<!DOCTYPE html>
<!-- pages/calendar.html — 강비서 강의 캘린더 (FullCalendar + Firebase) -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강의 캘린더 | 강비서</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/lectures.css" />
  <link rel="stylesheet" href="../css/calendar.css" />
  <style>
    :root {
      --fc-border-color: #e5e7eb;
      --fc-today-bg-color: rgba(14, 165, 233, 0.07);
      --fc-neutral-bg-color: #f9fafb;
      --fc-small-font-size: 0.78em;
      --fc-page-bg-color: transparent;
    }
    .fc-wrapper {
      background: var(--color-bg-card, #fff);
      border-radius: var(--radius-lg, 12px);
      box-shadow: var(--shadow-sm, 0 1px 3px rgba(0,0,0,.06));
      padding: 20px; margin-top: 16px; overflow: hidden;
    }
    .fc .fc-toolbar-title { font-size: 1.2rem; font-weight: 700; color: var(--color-text-primary, #111827); }
    .fc .fc-button-primary {
      background: var(--color-bg-elevated, #f3f4f6); border: 1px solid var(--color-border, #e5e7eb);
      color: var(--color-text-secondary, #6b7280); border-radius: 8px; font-size: 0.82rem;
      font-weight: 600; box-shadow: none; transition: all 150ms;
    }
    .fc .fc-button-primary:hover:not(:disabled) { background: var(--color-bg-hover, #e5e7eb); border-color: var(--color-border-focus, #9ca3af); color: var(--color-text-primary, #111827); }
    .fc .fc-button-primary:not(:disabled).fc-button-active,
    .fc .fc-button-primary:not(:disabled):active { background: #0ea5e9; border-color: #0284c7; color: #fff; box-shadow: none; }
    .fc .fc-button-primary:focus { box-shadow: 0 0 0 2px rgba(14,165,233,.3); }
    .fc .fc-col-header-cell-cushion { color: var(--color-text-secondary, #6b7280); font-weight: 600; font-size: 0.8rem; padding: 8px 4px; }
    .fc-day-sun .fc-col-header-cell-cushion { color: #ef4444; }
    .fc-day-sat .fc-col-header-cell-cushion { color: #3b82f6; }
    .fc .fc-daygrid-day-number { color: var(--color-text-secondary, #6b7280); font-size: 0.82rem; font-weight: 500; padding: 6px 8px; }
    .fc .fc-day-today .fc-daygrid-day-number { color: #0284c7; font-weight: 800; font-size: 0.88rem; }
    .fc td.fc-day-today { box-shadow: inset 0 0 0 2px #0ea5e9; }
    .fc .fc-day-sun .fc-daygrid-day-number { color: #ef4444; }
    .fc .fc-day-sat .fc-daygrid-day-number { color: #3b82f6; }
    .fc .fc-event { border-radius: 5px; font-size: 0.75rem; font-weight: 500; padding: 2px 6px; cursor: pointer; border: none !important; transition: opacity 150ms, transform 100ms; }
    .fc .fc-event:hover { opacity: .88; transform: translateY(-1px); }
    .fc .fc-event .fc-event-time { font-weight: 600; margin-right: 3px; }
    .fc .fc-timegrid-slot { height: 2.8em; border-color: #f3f4f6; }
    .fc .fc-timegrid-slot-label { font-size: 0.72rem; color: #9ca3af; }
    .fc .fc-timegrid-now-indicator-line { border-color: #ef4444; }
    .fc .fc-timegrid-now-indicator-arrow { border-top-color: #ef4444; border-bottom-color: #ef4444; }
    .cal-view-controls { display: flex; gap: 6px; }
    .cal-view-btn { padding: 7px 18px; border: 1px solid var(--color-border, #e5e7eb); border-radius: 8px; background: var(--color-bg-elevated, #f3f4f6); color: var(--color-text-secondary, #6b7280); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 150ms; line-height: 1; }
    .cal-view-btn.active { background: #0a1628; border-color: #0a1628; color: #fff; }
    .cal-view-btn:hover:not(.active) { background: var(--color-bg-hover, #e5e7eb); border-color: #9ca3af; color: var(--color-text-primary, #111827); }
    .calendar-page-header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; }
    .cal-legend-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 12px; padding: 12px 16px; background: var(--color-bg-card, #fff); border-radius: 10px; border: 1px solid var(--color-border, #e5e7eb); }
    .cal-legend-label { font-size: 0.72rem; font-weight: 600; color: var(--color-text-muted, #9ca3af); margin-right: 4px; white-space: nowrap; }
    .cal-legend-item-fc { display: flex; align-items: center; }
    .cal-legend-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.73rem; font-weight: 600; padding: 4px 10px; border-radius: 100px; white-space: nowrap; box-shadow: 0 1px 2px rgba(0,0,0,.06); transition: opacity 120ms; }
    .cal-legend-badge:hover { opacity: .8; }
    #cal-loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 40px; color: var(--color-text-muted, #9ca3af); font-size: 0.9rem; }
    #cal-loading.hidden { display: none; }
    .cal-spinner { width: 18px; height: 18px; border: 2px solid #e5e7eb; border-top-color: #0ea5e9; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fc .fc-event.fc-cancelled-lec { opacity: 0.6; border-style: dashed !important; }
    .fc .fc-event.fc-cancelled-lec .fc-event-title,
    .fc .fc-event.fc-cancelled-lec .fc-list-event-title { text-decoration: line-through; }
    .fc .fc-daygrid-event .fc-event-title { font-weight: 600; }
  </style>
</head>
<body>

  <div class="app-shell">
    <!-- 사이드바: authGuard → loadSidebar() 에서 동적 주입 -->

    <div class="app-main" id="app-main">

      <header class="topbar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴 열기">☰</button>
        <nav class="topbar-breadcrumb" aria-label="현재 위치">
          <span>강비서</span><span>›</span><span class="current">강의 캘린더</span>
        </nav>
        <div class="topbar-right">
          <span class="topbar-date" id="topbar-date"></span>
          <div class="topbar-notification" role="button" aria-label="알림" tabindex="0">
            🔔<span class="notification-dot"></span>
          </div>
        </div>
      </header>

      <main class="page-content">

        <div class="calendar-page-header">
          <div>
            <h1 class="page-title">강의 캘린더</h1>
            <p class="page-subtitle">월별·주별 강의 일정을 한눈에 확인하고 관리하세요.</p>
          </div>
          <div class="calendar-page-header-right">
            <div class="cal-view-controls" role="group" aria-label="캘린더 보기 전환">
              <button class="cal-view-btn active" id="btn-month-view" aria-pressed="true">월간</button>
              <button class="cal-view-btn"         id="btn-week-view"  aria-pressed="false">주간</button>
            </div>
            <button class="btn btn--primary" id="btn-add-lecture">+ 강의 추가</button>
          </div>
        </div>

        <div class="cal-legend-row" role="list" aria-label="색상 범례">
          <span class="cal-legend-label">범례</span>
          <div class="cal-legend-item-fc" role="listitem"><span class="cal-legend-badge" style="background:#ede9fe;color:#5b21b6;border:1.5px solid #c4b5fd;">💬 논의 중</span></div>
          <div class="cal-legend-item-fc" role="listitem"><span class="cal-legend-badge" style="background:#0ea5e9;color:#fff;">📅 강의 예정</span></div>
          <div class="cal-legend-item-fc" role="listitem"><span class="cal-legend-badge" style="background:#f59e0b;color:#fff;">⏳ 준비 임박 <small style="opacity:.8;font-size:.68rem;">7일↓</small></span></div>
          <div class="cal-legend-item-fc" role="listitem"><span class="cal-legend-badge" style="background:#d1fae5;color:#065f46;border:1.5px solid #6ee7b7;">🏃 행정 대기</span></div>
          <div class="cal-legend-item-fc" role="listitem"><span class="cal-legend-badge" style="background:#059669;color:#fff;">✅ 진행 완료</span></div>
          <div class="cal-legend-item-fc" role="listitem"><span class="cal-legend-badge" style="background:#fee2e2;color:#ef4444;border:1.5px solid #fca5a5;">💰 미입금</span></div>
          <div class="cal-legend-item-fc" role="listitem"><span class="cal-legend-badge" style="background:#f3f4f6;color:#9ca3af;border:1.5px dashed #d1d5db;text-decoration:line-through;">❌ 취소</span></div>
        </div>

        <div class="fc-wrapper">
          <div id="cal-loading"><div class="cal-spinner"></div><span>강의 데이터를 불러오는 중…</span></div>
          <div id="calendar"></div>
        </div>

      </main>
    </div>
  </div>

  <!-- 모달: authGuard(withModal:true) → loadModal() 에서 동적 주입 -->

  <script src="../js/common.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script type="module" src="../js/pages/calendar.js"></script>
</body>
</html>
