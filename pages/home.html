<!DOCTYPE html>
<!-- pages/home.html — 강비서 홈(대시보드) -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>홈 | 강비서</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/home.css" />
  <link rel="stylesheet" href="../css/lectures.css" />
</head>
<body>

  <div class="app-shell">
    <!-- 사이드바: authGuard → loadSidebar() 에서 동적 주입 -->

    <div class="app-main" id="app-main">

      <header class="topbar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴 열기">☰</button>
        <nav class="topbar-breadcrumb" aria-label="현재 위치">
          <span>강비서</span><span>›</span><span class="current">홈</span>
        </nav>
        <div class="topbar-right">
          <span class="topbar-date" id="topbar-date"></span>
          <div class="topbar-notification" role="button" aria-label="알림" tabindex="0">
            🔔<span class="notification-dot"></span>
          </div>
        </div>
      </header>

      <main class="page-content">

        <div class="page-header">
          <h1 class="page-title" id="greeting-text">안녕하세요 👋</h1>
          <p class="page-subtitle" id="greeting-subtitle">오늘의 강의 일정을 확인해 보세요.</p>
        </div>

        <div class="stat-bar" id="stat-bar" aria-label="오늘의 현황 요약"></div>

        <div class="home-grid">

          <div class="home-col-left">
            <section class="panel" aria-labelledby="briefing-heading">
              <div class="panel-header">
                <h2 class="panel-title" id="briefing-heading"><span class="panel-title-icon">📌</span>오늘의 강의 브리핑</h2>
                <a href="lectures.html" class="panel-action">전체 보기 →</a>
              </div>
              <div class="panel-body">
                <div class="lecture-briefing-list" id="briefing-list"></div>
              </div>
            </section>

            <section class="panel" aria-labelledby="todo-heading">
              <div class="panel-header">
                <h2 class="panel-title" id="todo-heading"><span class="panel-title-icon">✅</span>오늘의 할 일</h2>
              </div>
              <div class="panel-body">
                <div class="todo-input-row">
                  <input class="todo-input" type="text" id="todo-input" placeholder="할 일을 입력하세요" maxlength="80" aria-label="할 일 입력" />
                  <button class="todo-add-btn" id="todo-add-btn" aria-label="추가">+</button>
                </div>
                <div class="todo-list" id="todo-list" role="list" aria-label="할 일 목록"></div>
                <div class="todo-footer">
                  <span class="todo-count" id="todo-count"></span>
                  <span class="todo-clear-btn" id="todo-clear-done" role="button" tabindex="0">완료 항목 삭제</span>
                </div>
              </div>
            </section>
          </div>

          <div class="home-col-right">
            <section class="panel" aria-labelledby="timeline-heading">
              <div class="panel-header">
                <h2 class="panel-title" id="timeline-heading"><span class="panel-title-icon">⏱</span>오늘의 타임스케줄</h2>
                <a href="calendar.html" class="panel-action">캘린더 →</a>
              </div>
              <div class="panel-body">
                <div class="timeline-wrapper" id="timeline-list" aria-label="오늘 일정 타임라인"></div>
              </div>
            </section>
            <section class="panel" aria-labelledby="tomorrow-timeline-heading" style="margin-top:var(--space-4)">
              <div class="panel-header">
                <h2 class="panel-title" id="tomorrow-timeline-heading"><span class="panel-title-icon">🌅</span>내일의 타임스케줄</h2>
              </div>
              <div class="panel-body">
                <div class="timeline-wrapper" id="tomorrow-timeline-list" aria-label="내일 일정 타임라인"></div>
              </div>
            </section>
          </div>

        </div>

        <div class="home-full-row">
          <section class="panel" aria-labelledby="weekly-heading">
            <div class="panel-header">
              <h2 class="panel-title" id="weekly-heading"><span class="panel-title-icon">📆</span>이번 주 일정</h2>
              <a href="calendar.html" class="panel-action">캘린더 전체 보기 →</a>
            </div>
            <div class="panel-body">
              <div class="weekly-day-grid" id="weekly-day-grid" aria-label="이번 주 강의 일정"></div>
            </div>
            <div class="weekly-summary-bar" id="weekly-summary"></div>
          </section>
        </div>

      </main>
    </div>
  </div>

  <!-- 모달: authGuard(withModal:true) → loadModal() 에서 동적 주입 -->

  <script src="../js/common.js"></script>
  <script type="module" src="../js/pages/home.js"></script>
</body>
</html>
